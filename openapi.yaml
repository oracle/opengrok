  /suggest:
    get:
      tags: [Suggester]
      summary: Return suggestions
      operationId: getSuggestions
      parameters:
        - name: projects
          in: query
          description: List of projects for which to retrieve suggestions.
          required: true
          schema:
            type: string
        - name: field
          in: query
          description: Field for which to suggest.
          required: true
          schema:
            type: string
        - name: caret
          in: query
          description: Position of the caret in the input field.
          required: true
          schema:
            type: integer
        - name: full
          in: query
          description: Value of the Full Search input.
          schema:
            type: string
        - name: defs
          in: query
          description: Value of the Definitions input.
          schema:
            type: string
        - name: refs
          in: query
          description: Value of Symbol input.
          schema:
            type: string
        - name: path
          in: query
          description: Value of the File Path input.
          schema:
            type: string
        - name: hist
          in: query
          description: Value of the History input.
          schema:
            type: string
        - name: type
          in: query
          description: Value of the Type input.
          schema:
            type: string
      responses:
        '200':
          description: Suggestions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuggestResponse'
              example:
                time: 60
                suggestions:
                  - phrase: package
                    projects: [kotlin]
                    score: 387
                identifier: pprttq
                queryText: pprttq
                partialResult: false
  /suggest/config:
    get:
      tags: [Suggester]
      summary: Return suggester configuration
      operationId: getSuggesterConfig
      security: []
      responses:
        '200':
          description: Suggester configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuggesterConfig'
              example:
                enabled: true
                maxResults: 10
                minChars: 4
                allowedProjects: null
                maxProjects: 2147483647
                allowedFields: [defs, path, hist, refs, type, full]
                allowComplexQueries: true
                allowMostPopular: true
                showScores: false
                showProjects: true
                showTime: false
                rebuildCronConfig: "0 0 * * *"
                buildTerminationTime: 1800
                timeThreshold: 2000
  /suggest/init/queries:
    post:
      tags: [Suggester]
      summary: Update popularity data based on queries
      operationId: initializeSuggesterPopularityFromQueries
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
            example:
              - http://localhost:8080/source/search?project=kotlin&full=text
      responses:
        '204':
          description: Popularity data updated.
  /suggest/init/raw:
    post:
      tags: [Suggester]
      summary: Update popularity data based on the provided data
      operationId: initializeSuggesterPopularityFromRawData
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/SuggesterRawPopularityData'
            example:
              - project: kotlin
                field: full
                token: args
                increment: 100
      responses:
        '204':
          description: Popularity data updated.
  /suggest/popularity/{project}:
    get:
      tags: [Suggester]
      summary: Retrieve popularity data for project
      operationId: getSuggesterPopularityData
      parameters:
        - $ref: '#/components/parameters/ProjectName'
        - name: field
          in: query
          description: Field for which to retrieve data.
          schema:
            type: string
            default: full
        - name: page
          in: query
          description: Page of data.
          schema:
            type: integer
            default: 0
        - name: pageSize
          in: query
          description: Size of the page.
          schema:
            type: integer
            default: 100
        - name: all
          in: query
          description: If all data should be retrieved. If true, `page` and `pageSize` are ignored.
          schema:
            type: boolean
      responses:
        '200':
          description: Popularity data.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties:
                    type: integer
              example:
                - iso: 3
                - the: 3
                - to: 3
                - conform: 3
  /suggest/rebuild:
    put:
      tags: [Suggester]
      summary: Rebuild suggester data for all projects
      description: Kicks off suggester data rebuild in the background; it will likely complete after this API call returns.
      operationId: rebuildSuggesterData
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Suggester data rebuild started.
  /suggest/rebuild/{project}:
    put:
      tags: [Suggester]
      summary: Rebuild suggester data for given project
      description: Kicks off suggester data rebuild in the background; it will likely complete after this API call returns.
      operationId: rebuildProjectSuggesterData
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectName'
      responses:
        '204':
          description: Project suggester data rebuild started.
  /status/{uuid}:
    get:
      tags: [Status]
      summary: Check the state of an API request
      operationId: getApiRequestStatus
      parameters:
        - $ref: '#/components/parameters/Uuid'
      responses:
        '202':
          description: API request is still being processed.
    delete:
      tags: [Status]
      summary: Delete state associated with API request tracking
      description: This should be done only after the API request is completed, i.e. after the GET request for the API request state returns an appropriate status code such as 201.
      operationId: deleteApiRequestStatus
      parameters:
        - $ref: '#/components/parameters/Uuid'
      responses:
        '200':
          description: API request state deleted.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
  parameters:
    PathQuery:
      name: path
      in: query
      description: Path of file, relative to source root.
      required: true
      schema:
        type: string
    ConfigurationField:
      name: field
      in: path
      description: Configuration field name.
      required: true
      schema:
        type: string
    MessageTag:
      name: tag
      in: query
      description: Message tag.
      required: true
      schema:
        type: string
    GroupName:
      name: group
      in: path
      description: Group name.
      required: true
      schema:
        type: string
    ProjectName:
      name: project
      in: path
      description: Project name.
      required: true
      schema:
        type: string
    PropertyName:
      name: propertyname
      in: path
      description: Property name.
      required: true
      schema:
        type: string
    Uuid:
      name: uuid
      in: path
      description: API request UUID.
      required: true
      schema:
        type: string
        format: uuid
  responses:
    AcceptedAsync:
      description: Request accepted for asynchronous processing.
      headers:
        Location:
          description: URL of the status endpoint to check for the result of the API call.
          schema:
            type: string
            format: uri-reference
  schemas:
    AnnotationEntry:
      type: object
      properties:
        revision:
          type: string
        author:
          type: string
        description:
          type: string
        version:
          type: string
    FileDefinition:
      type: object
      properties:
        type:
          type: string
        signature:
          type: string
        text:
          type: string
        symbol:
          type: string
        lineStart:
          type: integer
        lineEnd:
          type: integer
        line:
          type: integer
        namespace:
          type: string
          nullable: true
    HistoryResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/HistoryEntry'
        start:
          type: integer
        count:
          type: integer
        total:
          type: integer
    HistoryEntry:
      type: object
      properties:
        revision:
          type: string
        date:
          type: integer
          format: int64
        author:
          type: string
        tags:
          type: string
          nullable: true
        message:
          type: string
        files:
          type: array
          items:
            type: string
          nullable: true
    DirectoryEntry:
      type: object
      properties:
        path:
          type: string
        numLines:
          type: integer
          nullable: true
        loc:
          type: integer
          nullable: true
        date:
          type: integer
          format: int64
          nullable: true
        description:
          type: string
          nullable: true
        pathDescription:
          type: string
        isDirectory:
          type: boolean
        size:
          type: integer
          format: int64
          nullable: true
    MessageCreateRequest:
      type: object
      properties:
        tags:
          type: array
          items:
            type: string
        messageLevel:
          type: string
          enum: [success, info, warning, error]
        text:
          type: string
        duration:
          type: string
          description: Java `java.time.Duration` string.
      required: [tags, messageLevel, text]
    Message:
      type: object
      properties:
        expired:
          type: boolean
        created:
          type: string
        tags:
          type: array
          items:
            type: string
        expiration:
          type: string
        cssClass:
          type: string
        text:
          type: string
    PathDescription:
      type: object
      properties:
        path:
          type: string
        description:
          type: string
      required: [path, description]
    SearchResponse:
      type: object
      properties:
        time:
          type: integer
        resultCount:
          type: integer
        startDocument:
          type: integer
        endDocument:
          type: integer
        results:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/SearchHit'
    SearchHit:
      type: object
      properties:
        line:
          type: string
        lineNumber:
          type: string
        tag:
          type: string
    SuggestResponse:
      type: object
      properties:
        time:
          type: integer
        suggestions:
          type: array
          items:
            $ref: '#/components/schemas/Suggestion'
        identifier:
          type: string
        queryText:
          type: string
        partialResult:
          type: boolean
    Suggestion:
      type: object
      properties:
        phrase:
          type: string
        projects:
          type: array
          items:
            type: string
        score:
          type: number
    SuggesterConfig:
      type: object
      properties:
        enabled:
          type: boolean
        maxResults:
          type: integer
        minChars:
          type: integer
        allowedProjects:
          type: array
          nullable: true
          items:
            type: string
        maxProjects:
          type: integer
        allowedFields:
          type: array
          items:
            type: string
        allowComplexQueries:
          type: boolean
        allowMostPopular:
          type: boolean
        showScores:
          type: boolean
        showProjects:
          type: boolean
        showTime:
          type: boolean
        rebuildCronConfig:
          type: string
        buildTerminationTime:
          type: integer
        timeThreshold:
          type: integer
    SuggesterRawPopularityData:
      type: object
      properties:
        project:
          type: string
        field:
          type: string
        token:
          type: string
        increment:
          type: integer
      required: [project, field, token, increment]
